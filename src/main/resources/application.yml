rts:
  store-root: ${RTS_STORE_ROOT:runtime-store}
  llm-enabled: ${RTS_LLM_ENABLED:false}
  llm-model: ${RTS_LLM_MODEL:gpt-5.5}
  llm-base-url: ${RTS_LLM_BASE_URL:https://pixel.try-chatapi.com}
  llm-api-key: ${RTS_LLM_API_KEY:}
  llm-wire-api: ${RTS_LLM_WIRE_API:responses}
  llm-store-responses: ${RTS_LLM_STORE_RESPONSES:false}
  llm-reasoning-effort: ${RTS_LLM_REASONING_EFFORT:low}
  llm-max-tokens: ${RTS_LLM_MAX_TOKENS:600}
  admin-caller-id: ${RTS_ADMIN_CALLER_ID:admin}
  admin-api-key-hash: ${RTS_ADMIN_API_KEY_HASH:}
  max-tool-calls: ${RTS_MAX_TOOL_CALLS:8}
  max-l2-objects: ${RTS_MAX_L2_OBJECTS:5}
  max-dependency-depth: ${RTS_MAX_DEPENDENCY_DEPTH:2}
  max-retrieved-tokens: ${RTS_MAX_RETRIEVED_TOKENS:12000}
  max-model-calls: ${RTS_MAX_MODEL_CALLS:1}
  max-latency-ms: ${RTS_MAX_LATENCY_MS:30000}
  planner-v2-enabled: ${RTS_PLANNER_V2_ENABLED:false}
  tool-orchestrator-enabled: ${RTS_TOOL_ORCHESTRATOR_ENABLED:false}
  reranker-enabled: ${RTS_RERANKER_ENABLED:false}
  confusable-check-enabled: ${RTS_CONFUSABLE_CHECK_ENABLED:false}
  vector-recall-enabled: ${RTS_VECTOR_RECALL_ENABLED:false}
  impact-candidates-enabled: ${RTS_IMPACT_CANDIDATES_ENABLED:false}
  test-plan-candidates-enabled: ${RTS_TEST_PLAN_CANDIDATES_ENABLED:false}
  mcp-expanded-tools-enabled: ${RTS_MCP_EXPANDED_TOOLS_ENABLED:false}
